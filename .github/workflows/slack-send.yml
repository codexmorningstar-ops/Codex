name: Slack Send

on:
  push:
    paths:
      - 'slack-request.txt'

permissions:
  contents: write

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install slack-sdk

      - name: Send message
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/slack_send.py

      - name: Write response via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(gh api /repos/${{ github.repository }}/contents/slack-response.txt \
            --jq '.sha' 2>/dev/null || echo "")
          
          CONTENT=$(base64 -w 0 slack-response.txt)
          
          if [ -n "$SHA" ]; then
            gh api --method PUT \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/contents/slack-response.txt \
              -f message="slack response" \
              -f content="$CONTENT" \
              -f sha="$SHA"
          else
            gh api --method PUT \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/contents/slack-response.txt \
              -f message="slack response" \
              -f content="$CONTENT"
          fi
